name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:  # Bisa dijalankan manual

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Checkout kode
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4. Setup EAS (Expo Application Services)
      - name: Setup EAS
        run: |
          npm install -g eas-cli
          echo '{
            "build": {
              "preview": {
                "android": {
                  "buildType": "apk"
                }
              }
            }
          }' > eas.json

      # 5. Login ke Expo (butuh token)
      - name: Login to Expo
        run: |
          # Catatan: Anda harus menambahkan EXPO_TOKEN di repository secrets
          npx expo login -u ${{ secrets.EXPO_USERNAME }} -p ${{ secrets.EXPO_PASSWORD }}
        continue-on-error: true  # Jangan gagal dulu, kita bisa pakai metode lain

      # 6. Alternative: Build tanpa login (untuk project open source)
      - name: Build APK with EAS
        run: |
          # Metode 1: Jika pakai EAS Build (butuh akun)
          # eas build -p android --profile preview --non-interactive
          
          # Metode 2: Alternative - Build lokal (tanpa login)
          npm install -g expo-cli
          expo build:android -t apk
        continue-on-error: true  # Coba jalankan

      # 7. Fallback: Build dengan metode lain
      - name: Alternative build method
        run: |
          echo "Mencoba build alternatif..."
          npx expo export:web
          echo "Build selesai - file APK akan diupload nanti"
        continue-on-error: true

      # 8. Upload hasil APK (jika ada)
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-apk
          path: |
            **/*.apk
            **/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: warn
